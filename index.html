<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Chiu Lok Yin — Selected Works 2023–2025</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:   #ffffff;
      --paper: #000000;
      --rule:  #2a2a2a;
      --ghost: #555555;
      --acc:   #999999;
      --font:  'Helvetica Neue', Helvetica, Arial, sans-serif;
      --hh:    48px;
      --fh:    48px;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font);
      font-weight: 200;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      touch-action: none;
    }

    /* ── HEADER ── */
    #header {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--hh);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid var(--rule);
      background: var(--paper);
      z-index: 300; user-select: none;
    }
    .h-name {
      font-size: clamp(9px,2.4vw,13px); font-weight:200;
      letter-spacing:.22em; text-transform:uppercase; white-space:nowrap;
    }
    .h-meta {
      font-size: clamp(7px,1.6vw,10px); letter-spacing:.14em;
      text-transform:uppercase; color:var(--ghost); white-space:nowrap;
    }

    /* ── FOOTER ── */
    #toolbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--fh);
      display: flex; align-items: center; justify-content: center;
      border-top: 1px solid var(--rule);
      background: var(--paper);
      z-index: 300; user-select: none;
    }
    .tb-btn {
      background:none; border:none; cursor:pointer;
      height:var(--fh); padding:0 clamp(5px,1.6vw,13px);
      display:flex; align-items:center; gap:5px;
      font-family:var(--font); font-size:clamp(7px,1.6vw,10px);
      font-weight:200; letter-spacing:.14em; text-transform:uppercase;
      color:var(--acc); transition:color .2s; white-space:nowrap;
    }
    .tb-btn:hover     { color:var(--ink); }
    .tb-btn:disabled  { color:var(--rule); cursor:default; }
    .tb-btn.is-active { color:var(--ink); }
    .tb-btn svg       { flex-shrink:0; }
    .tb-div  { width:1px; height:14px; background:var(--rule); margin:0 2px; flex-shrink:0; }
    #page-counter {
      min-width:60px; text-align:center;
      font-size:clamp(7px,1.6vw,10px); letter-spacing:.12em;
      text-transform:uppercase; color:var(--ghost); flex-shrink:0;
    }

    /* ══════════════════════════════════════
       FLIPBOOK  (desktop + landscape phone)
    ══════════════════════════════════════ */
    #flipbook-shell {
      position:fixed; top:var(--hh); bottom:var(--fh); left:0; right:0;
      display:flex; align-items:center; justify-content:center;
      background:var(--paper); overflow:hidden;
    }
    #stage {
      position:relative;
      transform-origin:center center;
      will-change:transform;
    }
    .page-wrap {
      position:absolute; top:0; left:0; right:0; bottom:0;
      pointer-events:none;
    }
    .page-wrap.visible  { opacity:1; pointer-events:auto; }
    .page-wrap.hidden   { opacity:0; pointer-events:none; }
    .page-wrap.fade-in  { animation:fadeIn  .4s ease forwards; }
    .page-wrap.fade-out { animation:fadeOut .35s ease forwards; }
    @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
    @keyframes fadeOut { from{opacity:1} to{opacity:0} }
    canvas { display:block; }

    .watermark {
      position:absolute; inset:0; pointer-events:none;
      display:flex; align-items:center; justify-content:center; z-index:5;
    }
    .watermark svg { width:65%; opacity:.045; user-select:none; }

    /* ══════════════════════════════════════
       VERTICAL STRIP  (portrait phone only)
    ══════════════════════════════════════ */
    #strip-shell {
      display:none;
      position:fixed; top:var(--hh); bottom:var(--fh); left:0; right:0;
      overflow-y:auto; overflow-x:hidden;
      -webkit-overflow-scrolling:touch;
      background:var(--paper);
      /* no scroll-snap — continuous scrolling as requested */
    }
    .strip-page {
      width:100%; position:relative;
      background:var(--paper); flex-shrink:0;
      /* black gap between pages */
      margin-bottom: 12px;
    }
    .strip-page canvas { display:block; width:100%; height:auto; }
    .strip-page .watermark { position:absolute; inset:0; }

    /* ══════════════════════════════════════
       GRID
    ══════════════════════════════════════ */
    #grid-shell {
      display:none;
      position:fixed; top:var(--hh); bottom:var(--fh); left:0; right:0;
      overflow-y:auto; overflow-x:hidden;
      -webkit-overflow-scrolling:touch;
      background:var(--paper); padding:10px;
      touch-action:pan-y;
    }
    #grid-shell.active { display:block; }
    #grid-container {
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:8px;
    }
    @media(min-width:600px)  { #grid-container { grid-template-columns:repeat(3,1fr); } }
    @media(min-width:900px)  { #grid-container { grid-template-columns:repeat(4,1fr); } }
    @media(min-width:1200px) { #grid-container { grid-template-columns:repeat(5,1fr); } }

    .grid-thumb {
      position:relative; overflow:hidden;
      background:#0d0d0d; cursor:pointer;
      border:1px solid transparent; transition:border-color .15s;
    }
    .grid-thumb:hover { border-color:var(--acc); }
    .grid-thumb canvas { display:block; width:100%; height:auto; }
    .grid-thumb .wm-grid {
      position:absolute; inset:0; pointer-events:none;
      display:flex; align-items:center; justify-content:center;
    }
    .grid-thumb .wm-grid svg { width:80%; opacity:.045; }
    .grid-thumb .g-num {
      position:absolute; bottom:5px; right:7px;
      font-size:8px; letter-spacing:.1em; color:rgba(255,255,255,.3);
    }

    /* ══════════════════════════════════════
       LOADING
    ══════════════════════════════════════ */
    #loading {
      position:fixed; inset:0; background:var(--paper);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:20px; z-index:500;
    }
    .l-name { font-size:clamp(13px,4vw,20px); font-weight:200; letter-spacing:.28em; text-transform:uppercase; }
    .l-sub  { font-size:clamp(8px,2vw,10px);  font-weight:200; letter-spacing:.20em; text-transform:uppercase; color:var(--ghost); }
    .l-track { width:min(180px,55vw); height:1px; background:var(--rule); position:relative; overflow:hidden; }
    .l-fill  { position:absolute; top:0; left:0; height:100%; width:0%; background:#fff; transition:width .3s ease; }

    #copyright {
      position:fixed; bottom:calc(var(--fh) + 7px); right:12px;
      font-size:9px; letter-spacing:.08em; color:#282828;
      z-index:301; user-select:none; pointer-events:none;
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="l-name">Chiu Lok Yin</div>
  <div class="l-sub">Selected Works 2023 – 2025</div>
  <div class="l-track"><div class="l-fill" id="load-fill"></div></div>
</div>

<div id="header">
  <span class="h-name">Chiu Lok Yin</span>
  <span class="h-meta">Selected Works — 2023 / 2025</span>
</div>

<div id="flipbook-shell"><div id="stage"></div></div>
<div id="strip-shell"></div>
<div id="grid-shell"><div id="grid-container"></div></div>

<div id="copyright">© 2026 Chiu Lok Yin. All rights reserved.</div>

<div id="toolbar">
  <button class="tb-btn" id="btn-first">
    <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><rect x="1" y="1" width="1.5" height="10" fill="currentColor"/><path d="M11 1L4 6l7 5V1z" fill="currentColor"/></svg>First
  </button>
  <div class="tb-div"></div>
  <button class="tb-btn" id="btn-prev">
    <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M8 1L3 6l5 5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>Prev
  </button>
  <div id="page-counter">— / —</div>
  <button class="tb-btn" id="btn-next">Next
    <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M4 1l5 5-5 5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <div class="tb-div"></div>
  <button class="tb-btn" id="btn-last">Last
    <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><rect x="9.5" y="1" width="1.5" height="10" fill="currentColor"/><path d="M1 1l7 5-7 5V1z" fill="currentColor"/></svg>
  </button>
  <div class="tb-div"></div>
  <button class="tb-btn" id="btn-grid">
    <svg width="10" height="10" viewBox="0 0 12 12" fill="none">
      <rect x="1" y="1" width="4" height="4" stroke="currentColor" stroke-width="1.2"/>
      <rect x="7" y="1" width="4" height="4" stroke="currentColor" stroke-width="1.2"/>
      <rect x="1" y="7" width="4" height="4" stroke="currentColor" stroke-width="1.2"/>
      <rect x="7" y="7" width="4" height="4" stroke="currentColor" stroke-width="1.2"/>
    </svg>Grid
  </button>
</div>

<script>
// ═══════════════════════════════════════════════
// CONSTANTS & SETUP
// ═══════════════════════════════════════════════
const PDF_URL   = 'portfolio.pdf';
const AUTHOR    = 'Chiu Lok Yin';
const COPYRIGHT = `© 2026 ${AUTHOR}. All rights reserved.`;

pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// Block browser native gestures only where we manage touch ourselves
const flipShell  = document.getElementById('flipbook-shell');
const stripShell = document.getElementById('strip-shell');
const gridShell  = document.getElementById('grid-shell');

document.addEventListener('touchmove', e => {
  // Allow native scroll only inside strip and grid shells
  if (e.target.closest('#strip-shell') || e.target.closest('#grid-shell')) return;
  e.preventDefault();
}, { passive: false });

document.addEventListener('touchstart', e => {
  if (e.touches.length > 1 &&
      !e.target.closest('#strip-shell') &&
      !e.target.closest('#grid-shell')) {
    e.preventDefault();
  }
}, { passive: false });

document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('dragstart',   e => e.preventDefault());
document.addEventListener('selectstart', e => e.preventDefault());

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let pdfDoc        = null;
let totalPages    = 0;
let currentPage   = 1;
let rendering     = false;
let gridMode      = false;
let currentLayout = null; // 'flipbook' | 'strip'
let stripBuilt    = false;
let gridBuilt     = false;

function isPortraitMobile() {
  return window.innerWidth < 600 && window.innerHeight > window.innerWidth;
}

// DPR: higher on mobile for sharp text, modest on desktop
function getDPR() {
  return isPortraitMobile()
    ? Math.min(window.devicePixelRatio || 1, 3)
    : Math.min(window.devicePixelRatio || 1, 1.5);
}

// ═══════════════════════════════════════════════
// WATERMARK
// ═══════════════════════════════════════════════
function makeWatermark(cls) {
  const d = document.createElement('div');
  d.className = cls || 'watermark';
  d.innerHTML = `<svg viewBox="0 0 400 80" xmlns="http://www.w3.org/2000/svg">
    <text x="200" y="48" text-anchor="middle" font-family="sans-serif"
          font-size="26" letter-spacing="8" fill="#fff">${AUTHOR.toUpperCase()}</text>
    <text x="200" y="68" text-anchor="middle" font-family="sans-serif"
          font-size="9"  letter-spacing="4" fill="#fff">${COPYRIGHT}</text>
  </svg>`;
  return d;
}

// ═══════════════════════════════════════════════
// SCALE  — fit-both for desktop (whole page, bars acceptable)
//          fit-width for portrait mobile
// ═══════════════════════════════════════════════
function viewerW() { return window.innerWidth; }
function viewerH() { return window.innerHeight - 48 - 48; }

function fitScale(rawVP) {
  if (isPortraitMobile()) {
    return viewerW() / rawVP.width;
  }
  // Desktop / landscape: fit BOTH dimensions — whole page always visible
  return Math.min(
    viewerW()  / rawVP.width,
    viewerH() / rawVP.height
  );
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
async function init() {
  const task = pdfjsLib.getDocument(PDF_URL);
  task.onProgress = ({ loaded, total }) => {
    if (total) document.getElementById('load-fill').style.width =
      Math.round(loaded / total * 100) + '%';
  };
  pdfDoc     = await task.promise;
  totalPages = pdfDoc.numPages;
  setLayoutMode();
  document.getElementById('loading').style.display = 'none';
  updateControls();
}

// ═══════════════════════════════════════════════
// LAYOUT SWITCHER
// ═══════════════════════════════════════════════
async function setLayoutMode() {
  if (gridMode) return;
  const want = isPortraitMobile() ? 'strip' : 'flipbook';
  if (want === currentLayout) return;
  currentLayout = want;

  if (want === 'strip') {
    flipShell.style.display  = 'none';
    stripShell.style.display = 'block';
    await buildStrip();
    scrollStripToPage(currentPage, false);
  } else {
    flipShell.style.display  = 'flex';
    stripShell.style.display = 'none';
    await renderFlipPage(currentPage, false);
  }
}

// ═══════════════════════════════════════════════
// FLIPBOOK RENDERER
// ═══════════════════════════════════════════════
function makeCanvas(cssW, cssH, dpr) {
  const c = document.createElement('canvas');
  c.width  = Math.round(cssW * dpr);
  c.height = Math.round(cssH * dpr);
  c.style.width  = cssW + 'px';
  c.style.height = cssH + 'px';
  return c;
}

async function renderFlipPage(num, animate) {
  if (rendering) return;
  rendering = true;

  // Reset zoom/pan
  pinchScale = 1; panX = 0; panY = 0;
  applyTransform(false);

  const stage = document.getElementById('stage');
  const page  = await pdfDoc.getPage(num);
  const rawVP = page.getViewport({ scale: 1 });
  const scale = fitScale(rawVP);
  const dpr   = getDPR();
  const cssW  = rawVP.width  * scale;
  const cssH  = rawVP.height * scale;

  stage.style.width  = cssW + 'px';
  stage.style.height = cssH + 'px';

  // Fade out previous
  const prev = stage.querySelector('.page-wrap.visible');
  if (prev && animate) {
    prev.classList.remove('visible');
    prev.classList.add('fade-out');
    setTimeout(() => { prev.classList.remove('fade-out'); prev.classList.add('hidden'); }, 350);
  } else if (prev) {
    prev.classList.remove('visible');
    prev.classList.add('hidden');
  }

  // Build or reuse
  let wrap = stage.querySelector(`[data-page="${num}"]`);
  if (!wrap) {
    wrap = document.createElement('div');
    wrap.className  = 'page-wrap hidden';
    wrap.dataset.page = num;
    wrap.style.width  = cssW + 'px';
    wrap.style.height = cssH + 'px';

    const cvs = makeCanvas(cssW, cssH, dpr);
    wrap.appendChild(cvs);
    wrap.appendChild(makeWatermark());
    stage.appendChild(wrap);

    const ctx = cvs.getContext('2d');
    ctx.scale(dpr, dpr);
    await page.render({ canvasContext: ctx, viewport: page.getViewport({ scale }) }).promise;
  }

  if (animate) {
    wrap.classList.remove('hidden');
    wrap.classList.add('fade-in', 'visible');
    setTimeout(() => wrap.classList.remove('fade-in'), 400);
  } else {
    wrap.classList.remove('hidden');
    wrap.classList.add('visible');
  }

  currentPage = num;
  rendering   = false;
  updateControls();
}

// ═══════════════════════════════════════════════
// PINCH ZOOM + PAN  (flipbook / landscape only)
//
// Key behaviour: pan sensitivity = 1/scale
// so at 2× zoom you must move 2× as far to
// pan the same distance — prevents accidental
// scroll-off when zoomed in.
// ═══════════════════════════════════════════════
let pinchScale  = 1;
let pinchBase   = 1;
let pinchDist0  = 0;
let pinchMid0   = { x: 0, y: 0 };
let pinchActive = false;
let panX = 0, panY = 0;
let panBase = { x: 0, y: 0 };
const MIN_SCALE = 1, MAX_SCALE = 5;

// One-finger swipe tracking
let sw0x = 0, sw0y = 0, swIsPinch = false;

function dist2(a, b)     { return Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY); }
function mid2(a, b)      { return { x:(a.clientX+b.clientX)/2, y:(a.clientY+b.clientY)/2 }; }

function clampPan(x, y, s) {
  const sw = flipShell.offsetWidth;
  const sh = flipShell.offsetHeight;
  const stW = document.getElementById('stage').offsetWidth  * s;
  const stH = document.getElementById('stage').offsetHeight * s;
  const mx = Math.max(0, (stW - sw) / 2);
  const my = Math.max(0, (stH - sh) / 2);
  return { x: Math.min(mx, Math.max(-mx, x)), y: Math.min(my, Math.max(-my, y)) };
}

function applyTransform(transition) {
  const stage = document.getElementById('stage');
  stage.style.transition = transition
    ? 'transform .32s cubic-bezier(.25,.46,.45,.94)'
    : 'none';
  stage.style.transform = `translate(${panX}px,${panY}px) scale(${pinchScale})`;
}

flipShell.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    swIsPinch   = true;
    pinchActive = true;
    pinchBase   = pinchScale;
    pinchDist0  = dist2(e.touches[0], e.touches[1]);
    pinchMid0   = mid2(e.touches[0], e.touches[1]);
    panBase     = { x: panX, y: panY };
  } else {
    swIsPinch   = false;
    pinchActive = false;
    sw0x = e.touches[0].clientX;
    sw0y = e.touches[0].clientY;
  }
}, { passive: true });

flipShell.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && pinchActive) {
    const d     = dist2(e.touches[0], e.touches[1]);
    const ratio = d / pinchDist0;
    pinchScale  = Math.min(MAX_SCALE, Math.max(MIN_SCALE, pinchBase * ratio));

    // Pan follows midpoint — sensitivity dampened by current scale
    const mid = mid2(e.touches[0], e.touches[1]);
    const rawDx = mid.x - pinchMid0.x;
    const rawDy = mid.y - pinchMid0.y;
    // Dampen: move 1/scale of the raw finger delta
    const dampened = clampPan(
      panBase.x + rawDx / pinchScale,
      panBase.y + rawDy / pinchScale,
      pinchScale
    );
    panX = dampened.x;
    panY = dampened.y;
    applyTransform(false);
    swIsPinch = true;
  }
}, { passive: true });

flipShell.addEventListener('touchend', e => {
  if (pinchActive && e.touches.length < 2) {
    pinchActive = false;
    // Rebound to scale 1 and reset pan
    pinchScale = 1; panX = 0; panY = 0;
    applyTransform(true);
    swIsPinch = true;
    return;
  }
  if (swIsPinch) { swIsPinch = false; return; }

  // Single-finger swipe → navigate pages
  const dx = e.changedTouches[0].clientX - sw0x;
  const dy = e.changedTouches[0].clientY - sw0y;
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.4) {
    dx < 0 ? goFlip(currentPage + 1) : goFlip(currentPage - 1);
  }
}, { passive: true });

// ═══════════════════════════════════════════════
// VERTICAL STRIP  (portrait phone)
// ═══════════════════════════════════════════════
async function buildStrip() {
  if (stripBuilt) return;
  stripBuilt = true;
  stripShell.innerHTML = '';

  const dpr = getDPR();
  const W   = viewerW();

  for (let i = 1; i <= totalPages; i++) {
    const page  = await pdfDoc.getPage(i);
    const rawVP = page.getViewport({ scale: 1 });
    const scale = W / rawVP.width;           // always full-width
    const cssH  = Math.round(rawVP.height * scale);

    const wrap = document.createElement('div');
    wrap.className    = 'strip-page';
    wrap.dataset.page = i;
    wrap.style.height = cssH + 'px';

    const cvs = document.createElement('canvas');
    cvs.width  = Math.round(W * dpr);
    cvs.height = Math.round(cssH * dpr);
    cvs.style.width  = W + 'px';
    cvs.style.height = cssH + 'px';

    wrap.appendChild(cvs);
    wrap.appendChild(makeWatermark());
    stripShell.appendChild(wrap);

    // Track current page via scroll position
    const pageObs = new IntersectionObserver(entries => {
      entries.forEach(en => {
        if (en.isIntersecting && en.intersectionRatio >= 0.4) {
          currentPage = parseInt(wrap.dataset.page);
          updateControls();
        }
      });
    }, { root: stripShell, threshold: 0.4 });
    pageObs.observe(wrap);

    // Lazy-render: only paint when near viewport
    const renderObs = new IntersectionObserver(entries => {
      entries.forEach(en => {
        if (!en.isIntersecting) return;
        renderObs.disconnect();
        const ctx = cvs.getContext('2d');
        ctx.scale(dpr, dpr);
        page.render({ canvasContext: ctx, viewport: page.getViewport({ scale }) });
      });
    }, { root: stripShell, rootMargin: '300px' });
    renderObs.observe(wrap);

    await new Promise(r => setTimeout(r, 0));
  }
}

function scrollStripToPage(num, smooth) {
  const wrap = stripShell.querySelector(`[data-page="${num}"]`);
  if (wrap) wrap.scrollIntoView({ behavior: smooth ? 'smooth' : 'instant' });
}

// Strip toolbar buttons scroll to page
function goStrip(num) {
  num = Math.max(1, Math.min(totalPages, num));
  currentPage = num;
  scrollStripToPage(num, true);
  updateControls();
}

// ═══════════════════════════════════════════════
// GRID
// ═══════════════════════════════════════════════
document.getElementById('btn-grid').addEventListener('click', () => {
  gridMode = !gridMode;
  document.getElementById('btn-grid').classList.toggle('is-active', gridMode);

  if (gridMode) {
    flipShell.style.display  = 'none';
    stripShell.style.display = 'none';
    gridShell.classList.add('active');
    buildGrid();
  } else {
    gridShell.classList.remove('active');
    currentLayout = null;
    setLayoutMode();
  }
  updateControls();
});

async function buildGrid() {
  const container = document.getElementById('grid-container');
  if (gridBuilt) return;
  gridBuilt = true;

  for (let i = 1; i <= totalPages; i++) {
    const cell = document.createElement('div');
    cell.className    = 'grid-thumb';
    cell.dataset.page = i;

    // number label
    const num = document.createElement('div');
    num.className = 'g-num';
    num.textContent = i;
    cell.appendChild(num);

    // watermark
    const wm = document.createElement('div');
    wm.className = 'wm-grid';
    wm.innerHTML = `<svg viewBox="0 0 400 80" xmlns="http://www.w3.org/2000/svg">
      <text x="200" y="48" text-anchor="middle" font-family="sans-serif"
            font-size="26" letter-spacing="8" fill="#fff">${AUTHOR.toUpperCase()}</text>
      <text x="200" y="68" text-anchor="middle" font-family="sans-serif"
            font-size="9"  letter-spacing="4" fill="#fff">${COPYRIGHT}</text>
    </svg>`;
    cell.appendChild(wm);

    // Tap → exit grid, go to that page in flipbook/strip
    cell.addEventListener('click', () => openFromGrid(parseInt(cell.dataset.page)));

    container.appendChild(cell);
  }

  // Lazy-render thumbnails as they scroll into view
  const obs = new IntersectionObserver(async entries => {
    for (const en of entries) {
      if (!en.isIntersecting) continue;
      const cell = en.target;
      if (cell.querySelector('canvas')) { obs.unobserve(cell); continue; }
      obs.unobserve(cell);

      const n     = parseInt(cell.dataset.page);
      const page  = await pdfDoc.getPage(n);
      const rawVP = page.getViewport({ scale: 1 });
      const vp    = page.getViewport({ scale: 0.14 });

      const cvs = document.createElement('canvas');
      cvs.width  = Math.round(vp.width);
      cvs.height = Math.round(vp.height);
      cvs.style.width  = '100%';
      cvs.style.height = 'auto';
      cell.style.aspectRatio = `${rawVP.width} / ${rawVP.height}`;
      cell.insertBefore(cvs, cell.firstChild);
      page.render({ canvasContext: cvs.getContext('2d'), viewport: vp });
    }
  }, { root: gridShell, rootMargin: '400px' });

  container.querySelectorAll('.grid-thumb').forEach(c => obs.observe(c));
}

function openFromGrid(num) {
  gridMode = false;
  document.getElementById('btn-grid').classList.remove('is-active');
  gridShell.classList.remove('active');

  currentPage   = num;
  currentLayout = null;

  // Clear flipbook cache so it re-renders at correct layout size
  document.getElementById('stage').innerHTML = '';
  rendering  = false;
  // Don't clear strip — just scroll to position
  setLayoutMode().then(() => {
    if (currentLayout === 'strip') goStrip(num);
  });
  updateControls();
}

// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════
function goFlip(num) {
  if (!pdfDoc || gridMode) return;
  num = Math.max(1, Math.min(totalPages, num));
  if (num === currentPage) return;
  renderFlipPage(num, true);
}

function goTo(num) {
  if (gridMode) return;
  if (currentLayout === 'strip') goStrip(num);
  else goFlip(num);
}

function updateControls() {
  document.getElementById('page-counter').textContent =
    totalPages ? `${currentPage} / ${totalPages}` : '— / —';
  const atStart = currentPage <= 1;
  const atEnd   = currentPage >= totalPages;
  document.getElementById('btn-first').disabled = atStart || gridMode;
  document.getElementById('btn-prev') .disabled = atStart || gridMode;
  document.getElementById('btn-next') .disabled = atEnd   || gridMode;
  document.getElementById('btn-last') .disabled = atEnd   || gridMode;
}

document.getElementById('btn-first').addEventListener('click', () => goTo(1));
document.getElementById('btn-prev') .addEventListener('click', () => goTo(currentPage - 1));
document.getElementById('btn-next') .addEventListener('click', () => goTo(currentPage + 1));
document.getElementById('btn-last') .addEventListener('click', () => goTo(totalPages));

document.addEventListener('keydown', e => {
  if (gridMode) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(currentPage + 1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goTo(currentPage - 1);
  if (e.key === 'Home') goTo(1);
  if (e.key === 'End')  goTo(totalPages);
});

// ═══════════════════════════════════════════════
// RESIZE / ORIENTATION CHANGE
// ═══════════════════════════════════════════════
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(async () => {
    if (gridMode) return;
    // Full reset on orientation change
    document.getElementById('stage').innerHTML = '';
    rendering     = false;
    stripBuilt    = false;
    currentLayout = null;
    stripShell.innerHTML = '';
    pinchScale = 1; panX = 0; panY = 0;
    await setLayoutMode();
  }, 220);
});

// ═══════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════
init();
</script>
</body>
</html>
